services:
  - type: web
    name: fake-news-backend
    runtime: python
    buildCommand: "cd Backend && pip install -r requirements.txt"
    startCommand: "cd Backend && uvicorn app:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: PYTHON_VERSION
        value: "3.9"
      - key: PORT
        value: "8000"
    plan: free
    healthCheckPath: /health
